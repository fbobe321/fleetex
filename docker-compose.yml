# Fleetex — the whole Python stack, one command:
#
#     docker compose up --build
#
# Then open http://localhost:3000 → register → create/open a project.
# Multiple browser tabs (or people) editing the same doc sync live.
#
# Services talk to each other over the compose network by service name; only web
# (3000) and real-time (3026, the browser websocket) are published to the host.
# All Dockerfiles build from the repo root (they COPY services/_kit + the service).
#
# NOTE: distinct from the `fleetex` PyPI launcher's compose project (which runs
# stock Overleaf CE on :8080). This is the Python reimplementation, on :3000.
name: fleetex-app

x-build: &repo-root
  context: .

# applied to every service so the stack auto-restarts on reboot
# (with Docker enabled at boot: `sudo systemctl enable docker`).
x-defaults: &defaults
  restart: unless-stopped

services:
  mongo:
    <<: *defaults
    image: mongo:8.0
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    <<: *defaults
    image: redis:6.2
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  docstore:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/docstore/Dockerfile}
    environment:
      MONGO_URL: mongodb://mongo:27017/sharelatex
    depends_on:
      mongo: {condition: service_healthy}

  filestore:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/filestore/Dockerfile}
    environment:
      BACKEND: fs
      FILESTORE_PATH: /var/lib/overleaf/data/filestore
    volumes:
      - filestore_data:/var/lib/overleaf/data/filestore

  clsi:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/clsi/Dockerfile}
    volumes:
      - clsi_data:/app/clsi_data

  chat:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/chat/Dockerfile}
    environment:
      MONGO_URL: mongodb://mongo:27017/sharelatex
    depends_on:
      mongo: {condition: service_healthy}

  notifications:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/notifications/Dockerfile}
    environment:
      MONGO_URL: mongodb://mongo:27017/sharelatex
    depends_on:
      mongo: {condition: service_healthy}

  document-updater:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/document-updater/Dockerfile}
    environment:
      REDIS_URL: redis://redis:6379
      DOCSTORE_URL: http://docstore:3016
      # checkpoint a version to project-history on every flush
      PROJECT_HISTORY_URL: http://project-history:3054
    depends_on:
      redis: {condition: service_healthy}
      docstore: {condition: service_started}

  project-history:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/project-history/Dockerfile}
    environment:
      MONGO_URL: mongodb://mongo:27017/sharelatex
      DOCUMENT_UPDATER_URL: http://document-updater:3003
    depends_on:
      mongo: {condition: service_healthy}

  web:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/web/Dockerfile}
    environment:
      MONGO_URL: mongodb://mongo:27017/sharelatex
      REDIS_URL: redis://redis:6379
      DOCSTORE_URL: http://docstore:3016
      SESSION_SECRET: fleetex-dev-secret-change-me
      OPEN_REGISTRATION: "true"
      # The browser connects to real-time directly, so this is a HOST-reachable URL:
      # The browser opens the live-sync websocket to THIS url directly, so it
      # must be reachable from wherever the browser runs. Default suits a browser
      # on the docker host; for LAN/remote access override it, e.g.:
      #   WEBSOCKET_URL=http://192.168.50.21:3026 docker compose up -d web
      WEBSOCKET_URL: ${WEBSOCKET_URL:-http://localhost:3026}
      WEB_API_USER: overleaf
      WEB_API_PASSWORD: password
    ports:
      - "3000:3000"
    depends_on:
      mongo: {condition: service_healthy}
      redis: {condition: service_healthy}
      docstore: {condition: service_started}

  real-time:
    <<: *defaults
    build: {<<: *repo-root, dockerfile: services/real-time/Dockerfile}
    environment:
      REDIS_URL: redis://redis:6379
      WEB_HOST: web
      WEB_PORT: "3000"
      DOCUMENT_UPDATER_HOST: document-updater
      WEB_API_USER: overleaf
      WEB_API_PASSWORD: password
      # MUST match web's SESSION_SECRET/COOKIE_NAME: real-time verifies the
      # signed session cookie off the socket handshake to authenticate the user.
      SESSION_SECRET: fleetex-dev-secret-change-me
      COOKIE_NAME: overleaf.sid
    ports:
      - "3026:3026"
    depends_on:
      redis: {condition: service_healthy}
      web: {condition: service_started}
      document-updater: {condition: service_started}

volumes:
  mongo_data:
  redis_data:
  filestore_data:
  clsi_data:
