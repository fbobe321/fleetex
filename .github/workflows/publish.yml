name: Publish to PyPI

# Publishes on every version tag, e.g.  git tag v0.1.1 && git push --tags
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
      # Configure once at: https://pypi.org/manage/project/fleetex/settings/publishing/
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
