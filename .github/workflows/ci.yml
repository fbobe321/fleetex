name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The launcher (pure-stdlib, targets 3.9+).
  launcher:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Build sanity check
        run: |
          python -m build
          twine check dist/*

  # The Python reimplementation services (FastAPI/Motor, require 3.10+).
  services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install kit + services
        run: |
          pip install -e services/_kit
          for svc in services/*/; do
            [ -f "${svc}pyproject.toml" ] || continue
            [ "$svc" = "services/_kit/" ] && continue
            pip install -e "${svc}[dev]"
          done
      - name: Test all services
        run: bash services/test-all.sh
